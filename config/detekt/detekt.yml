build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

# Spring Kotlin 관용구와 충돌하는 규칙 비활성
performance:
  SpreadOperator:
    active: false

# 도메인 API 특성(필터 다중 파라미터, 다필드 엔티티, 다기능 서비스) 반영한 임계값
complexity:
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    thresholdInClasses: 20
    thresholdInFiles: 20

style:
  # Map/DTO 즉시 반환 등 짧은 표현식에서 과도하게 걸리는 규칙 완화
  ReturnCount:
    active: true
    max: 3
  # 라인 길이는 ktlint(포매터)가 관장 — detekt에서는 중복 검사 비활성
  MaxLineLength:
    active: false
