spring:
  application:
    name: flori-ai-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flori}
    username: ${DB_USER:flori}
    password: ${DB_PASSWORD:flori}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 스키마의 SSOT는 docs/sql DDL(직접 관리). 엔티티-스키마 정합성은 validate로 강제(스키마 생성/변경 안 함).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

jwt:
  # 운영에서는 반드시 32바이트 이상의 강한 값으로 교체(환경변수 주입). 아래는 로컬 개발용 플레이스홀더.
  secret: ${JWT_SECRET:local-dev-insecure-jwt-secret-please-change-32bytes+}
  access-ttl-seconds: ${JWT_ACCESS_TTL:900}        # 15분
  refresh-ttl-seconds: ${JWT_REFRESH_TTL:1209600}  # 14일
  # 동시/중복 refresh 멱등 윈도(초). 같은 refresh 토큰으로 이 시간 내 다시 호출하면 회전을 1회만 하고
  # 같은 결과를 돌려준다(프리페치/멀티탭/쿠키저장 실패 재시도로 인한 rotation race → 로그아웃 방지).
  # 0 이하면 멱등 비활성(매 호출 회전, 즉시 재사용은 INVALID_TOKEN).
  refresh-dedup-ttl-seconds: ${JWT_REFRESH_DEDUP_TTL:30}

# CORS 허용 origin (앱/웹/홈페이지). 콤마 구분.
# - 3000: homepage(랜딩) 로컬, 3100: web(admin) 로컬, 8081: 모바일 로컬
# - https://flori.ai.kr: 운영 홈페이지(정적 사이트가 공개 waitlist API 직접 호출)
# prod 는 CORS_ALLOWED_ORIGINS 환경변수로 명시 주입(운영 도메인만) 권장.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3100,http://localhost:8081}

# Discord 알림 (미설정 시 콘솔 로깅으로 폴백)
discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}                              # 운영 에러(DiscordErrorReporter)
  signup-webhook-url: ${DISCORD_SIGNUP_WEBHOOK_URL:}                # 유저 가입 알림
  verification-webhook-url: ${DISCORD_VERIFICATION_WEBHOOK_URL:}    # 사업자 인증 신청 알림
  waitlist-webhook-url: ${DISCORD_WAITLIST_WEBHOOK_URL:}            # 사전등록 알림
  interview-webhook-url: ${DISCORD_INTERVIEW_WEBHOOK_URL:}          # 유저 인터뷰 신청 알림
  billing-webhook-url: ${DISCORD_BILLING_WEBHOOK_URL:}               # 빌링 이벤트 알림

# SOLAPI 알림톡/SMS (미설정 시 콘솔 폴백). 알림톡은 카카오 비즈채널 인증 후 pf-id/template-id 발급.
solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  sender-phone: ${SOLAPI_SENDER_PHONE:}                              # 등록된 SMS 발신번호(폴백)
  pf-id: ${SOLAPI_PF_ID:}                                            # 카카오 발신프로필 ID
  approval-template-id: ${SOLAPI_APPROVAL_TEMPLATE_ID:}              # 사업자 인증 승인 알림톡 템플릿

# S3 presigned 업로드 (bucket 미설정 시 관련 빈 미생성 — 로컬 부팅 가능)
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${S3_BUCKET:}
    presign-expiry-seconds: ${S3_PRESIGN_EXPIRY:300}
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:}

# FCM 푸시 (enabled=true 일 때만 Firebase 초기화) — 모바일 앱 대상
fcm:
  enabled: ${FCM_ENABLED:false}
  credentials: ${FCM_CREDENTIALS:}

# Web Push(VAPID) — 브라우저(PWA) 대상. public/private 키 모두 설정 시 실제 발송, 아니면 로깅 폴백.
# public-key는 web의 NEXT_PUBLIC_VAPID_PUBLIC_KEY와 동일한 키페어여야 한다(짝이 맞아야 발송 가능).
vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}
  subject: ${VAPID_SUBJECT:mailto:admin@flori.ai.kr}

# aT 화훼유통정보 OpenAPI(f001) — 일별 경락가 적재(단일 시장 = aT 양재).
# service-key 미설정 시 적재 cron 은 no-op(경고 로그) → 키 없는 dev 부팅 가능.
flori:
  flower-api:
    base-url: ${FLOWER_API_BASE_URL:https://flower.at.or.kr/api/returnData.api}
    service-key: ${FLOWER_API_SERVICE_KEY:}
    cron: ${FLOWER_API_CRON:0 30 6 * * *}   # 매일 KST 06:30
    backfill-days: ${FLOWER_API_BACKFILL_DAYS:3}
    page-size: ${FLOWER_API_PAGE_SIZE:1000}

# 내부 API(수집/브로드캐스트) Bearer 키. 미설정 시 내부 API 접근 차단.
internal:
  api-key: ${INTERNAL_API_KEY:}

# 토스페이먼츠 자동결제(빌링)
toss:
  secret-key: ${TOSS_SECRET_KEY:test_sk_REPLACE_WITH_SANDBOX_KEY}
  base-url: ${TOSS_BILLING_BASE_URL:https://api.tosspayments.com}
  connect-timeout-ms: ${TOSS_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${TOSS_READ_TIMEOUT_MS:10000}

# 토스 빌링키 암호화(AES-256-GCM). 운영에서는 반드시 32바이트 Base64 강한 키로 교체(환경변수 주입).
billing:
  encryption-key: ${BILLING_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

# RevenueCat 구독 웹훅 Bearer 시크릿. 미설정 시 웹훅 접근 차단(실제 키는 운영에서 env 주입).
revenuecat:
  webhook-secret: ${REVENUECAT_WEBHOOK_SECRET:}

# 운영 콘솔 AI 헬스 프록시 타깃. 미설정(빈 값) 시 해당 타깃은 응답에서 생략된다.
ai:
  health:
    server-url: ${AI_HEALTH_SERVER_URL:}
    litellm-url: ${AI_HEALTH_LITELLM_URL:}
  # AI 게이트웨이 — ai-server(FastAPI, 내부망). base-url 빈 값이면 AI 기능 비활성.
  gateway:
    base-url: ${AI_SERVER_URL:}
    internal-key: ${AI_INTERNAL_KEY:}
    chat-model: ${AI_CHAT_MODEL:claude-sonnet-4-6}
    usage-cap-per-day: ${AI_USAGE_CAP_PER_DAY:500}
    proposal-ttl-seconds: ${AI_PROPOSAL_TTL_SECONDS:86400}

springdoc:
  # 문서 본문 = RestDocs 생성 스펙(static/docs/open-api-3.0.1.json).
  # OpenApiConfig가 그 스펙(paths/components)을 읽어 bearerAuth 보안 스킴과 합쳐 /v3/api-docs로 노출하고,
  # swagger-ui는 그 병합본을 보여준다(→ Authorize 버튼 동작).
  # packages-to-scan: 더미 패키지로 컨트롤러 스캔 비활성(@Operation 제거됨 → 스캔 시 RestDocs 리치 경로 덮어쓰기 방지).
  packages-to-scan: kr.ai.flori.__docs_from_restdocs_only__
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}     # 운영에선 env로 false 주입 → API 계약 비공개
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}   # 운영에선 env로 false
    path: /swagger-ui.html
    persist-authorization: true   # 토큰 1회 입력 시 새로고침/요청 간 유지(운영 Swagger 비활성 권장)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# 카카오 OAuth (소셜 로그인). client-secret은 운영에서 env 주입(커밋 금지).
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
  client-secret: ${KAKAO_CLIENT_SECRET:}

# 구글 OAuth (소셜 로그인). 자격증명은 운영에서 env 주입(커밋 금지).
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}

# 네이버 OAuth (소셜 로그인). 자격증명은 운영에서 env 주입(커밋 금지).
naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}
