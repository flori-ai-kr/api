spring:
  application:
    name: hazel-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hazel}
    username: ${DB_USER:hazel}
    password: ${DB_PASSWORD:hazel}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 스키마의 SSOT는 Flyway. 엔티티가 추가되는 도메인 SPEC에서는 validate 권장.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
