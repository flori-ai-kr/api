spring:
  application:
    name: hazel-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hazel}
    username: ${DB_USER:hazel}
    password: ${DB_PASSWORD:hazel}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 스키마의 SSOT는 Flyway. 엔티티-스키마 정합성은 validate로 강제.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  # 운영에서는 반드시 32바이트 이상의 강한 값으로 교체(환경변수 주입). 아래는 로컬 개발용 플레이스홀더.
  secret: ${JWT_SECRET:local-dev-insecure-jwt-secret-please-change-32bytes+}
  access-ttl-seconds: ${JWT_ACCESS_TTL:900}        # 15분
  refresh-ttl-seconds: ${JWT_REFRESH_TTL:1209600}  # 14일

# CORS 허용 origin (앱/웹). 콤마 구분.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

# 운영 에러 알림 (미설정 시 콘솔 로깅으로 폴백)
discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

# S3 presigned 업로드 (bucket 미설정 시 관련 빈 미생성 — 로컬 부팅 가능)
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${S3_BUCKET:}
    presign-expiry-seconds: ${S3_PRESIGN_EXPIRY:300}
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:}

# FCM 푸시 (enabled=true 일 때만 Firebase 초기화)
fcm:
  enabled: ${FCM_ENABLED:false}
  credentials: ${FCM_CREDENTIALS:}

# 내부 API(수집/브로드캐스트) Bearer 키. 미설정 시 내부 API 접근 차단.
internal:
  api-key: ${INTERNAL_API_KEY:}

# RevenueCat 구독 웹훅 Bearer 시크릿. 미설정 시 웹훅 접근 차단(실제 키는 운영에서 env 주입).
revenuecat:
  webhook-secret: ${REVENUECAT_WEBHOOK_SECRET:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
